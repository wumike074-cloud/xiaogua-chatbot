function handleImageUpload(fileInput, textareaId, btnId, mode) {
  var file = fileInput.files[0];
  if (!file) return;
  if (_ocrBusy) return;
  _ocrBusy = true;

  var textarea = document.getElementById(textareaId);
  var btn = document.getElementById(btnId);
  var resultEl = mode === "add" ? document.getElementById("addDeviceResult") : document.getElementById("batchParseResult");
  var btnText = btn ? btn.textContent : "";
  if (btn) { btn.textContent = "⏳ 识别中..."; btn.classList.add("loading"); }

  // Compress large images before upload
  var img = new Image();
  img.onload = function() {
    var MAX = 2048;
    var w = img.width, h = img.height;
    if (w > MAX || h > MAX) {
      var ratio = Math.min(MAX / w, MAX / h);
      w = Math.round(w * ratio);
      h = Math.round(h * ratio);
    }
    var canvas = document.createElement("canvas");
    canvas.width = w;
    canvas.height = h;
    var ctx = canvas.getContext("2d");
    ctx.drawImage(img, 0, 0, w, h);
    URL.revokeObjectURL(img.src);

    var base64 = canvas.toDataURL("image/jpeg", 0.85);

    fetch(SUPABASE_URL + "/functions/v1/ocr-baidu", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + SUPABASE_KEY
      },
      body: JSON.stringify({ image: base64 })
    }).then(function(res) {
      return res.json().then(function(data) {
        if (!res.ok) throw new Error(data.error + (data.detail ? ": " + data.detail : ""));
        return data;
      });
    }).then(function(data) {
      if (textarea) {
        var old = textarea.value;
        textarea.value = old ? old + "\n" + data.text : data.text;
        textarea.focus();
      }
      if (btn) { btn.textContent = btnText; btn.classList.remove("loading"); }
      fileInput.value = "";
      _ocrBusy = false;

      // Auto-parse
      if (mode === "add") {
        addDevicesFromDialog();
      } else {
        parseAndRender();
      }
    }).catch(function(err) {
      if (btn) { btn.textContent = btnText; btn.classList.remove("loading"); }
      fileInput.value = "";
      if (resultEl) { resultEl.textContent = "识别失败: " + (err.message || err); resultEl.className = "batch-parse-result warn"; }
      _ocrBusy = false;
    });
  };
  img.onerror = function() {
    if (btn) { btn.textContent = btnText; btn.classList.remove("loading"); }
    if (resultEl) { resultEl.textContent = "图片加载失败"; resultEl.className = "batch-parse-result warn"; }
    URL.revokeObjectURL(img.src);
    _ocrBusy = false;
  };
  img.src = URL.createObjectURL(file);
}

function detectModelFromSN(sn) {
  var s = sn.toUpperCase();
  // Letter-prefix models
  if (/^SC300/.test(s)) return "SC300";
  if (/^SC200/.test(s)) return "SC200";
  if (/^TL/.test(s)) return "SC260";
  if (/^Y1/.test(s)) return "Y1";
  if (/^D/.test(s)) return "SDL2";
  // Numeric-prefix models
  if (/^143/.test(s)) return "Sfaira one系列";
  if (/^16/.test(s)) return "SV100系列";
  if (/^17/.test(s)) return "SV100系列";
  if (/^18/.test(s)) return "P2系列";
  if (/^21/.test(s)) return "X1系列";
  if (/^22/.test(s)) return "E1 lite";
  if (/^31/.test(s)) return "Orion one系列";
  if (/^41/.test(s)) return "S20";
  if (/^51/.test(s)) return "Z1系列";
  if (/^61/.test(s)) return "Horus";
  if (/^71/.test(s)) return "XBase";
  if (/^743/.test(s)) return "Sfaira one系列";
  if (/^74/.test(s)) return "SAgro200";
  return "";
}

function parseBatchInput(text) {
  if (!text || !text.trim()) return { orders: [], devices: [], warnings: [] };

  var lines = text.split(/\r?\n/);
  var currentOrder = "";
  var devices = [];
  var orders = [];
  var seenSNs = {};
  var warnings = [];

  for (var i = 0; i < lines.length; i++) {
    var line = lines[i].trim();
    if (!line) continue;

    // Order number: starts with XYZ, SXH, or SXHB (case-insensitive)
    if (/^xyz/i.test(line) || /^sxh/i.test(line)) {
      // Extract just the order token (e.g. "XYZCOLTES2602" from "XYZCOLTES2602 some text")
      var tok = line.split(/\s+/)[0];
      currentOrder = tok.toUpperCase();
      var found = false;
      for (var o = 0; o < orders.length; o++) {
        if (orders[o].orderNumber === currentOrder) { found = true; break; }
      }
      if (!found) orders.push({ orderNumber: currentOrder, devices: [] });
      continue;
    }

    // Also detect order numbers embedded mid-line (e.g. "BHCH IT, XYZCOLTES2602")
    var ordEmbed = line.match(/\b(xyz[a-z0-9]{3,})\b/i) || line.match(/\b(sxh[a-z0-9]{2,})\b/i);
    if (ordEmbed) {
      var embOrder = ordEmbed[1].toUpperCase();
      currentOrder = embOrder;
      var embFound = false;
      for (var oe = 0; oe < orders.length; oe++) {
        if (orders[oe].orderNumber === embOrder) { embFound = true; break; }
      }
      if (!embFound) orders.push({ orderNumber: embOrder, devices: [] });
    }

    
    // ── Tabular format: tab-separated or multi-space columns ──
    // e.g. "2026-06-17 17:33:48    6126A0003    default    20260913    <64-hex-reg-code>"
    if (/\t/.test(line) || /  /.test(line)) {
      var parts = line.split(/\t/);
      // If no tab, try splitting by 2+ spaces
      if (parts.length === 1) parts = line.split(/  +/);
      for (var ci = 0; ci < parts.length; ci++) {
        var token = parts[ci].trim();
        if (!token) continue;
        // SN: alphanumeric, 6-20 chars
        if (/^[A-Za-z0-9]{6,20}$/.test(token) && !/^[A-Fa-f0-9]{64}$/.test(token) && !/^default$/i.test(token) && !/^\d{8}$/.test(token) && !/^bf/i.test(token)) {
          if (seenSNs[token]) {
            warnings.push("重复SN已跳过: " + token);
            continue;
          }
          seenSNs[token] = true;

          // Look for registration code nearby (64 hex chars)
          var reg = "";
          for (var cj = 0; cj < parts.length; cj++) {
            if (cj !== ci && (/^[A-Fa-f0-9]{64}$/.test(parts[cj].trim()) || /^bf/i.test(parts[cj].trim()))) {
              reg = parts[cj].trim().toUpperCase();
              break;
            }
          }

          // Check for order number in the same line
          var ord = "";
          for (var ck = 0; ck < parts.length; ck++) {
            if (/^(xyz|sxh)/i.test(parts[ck].trim())) {
              ord = parts[ck].trim().toUpperCase();
              break;
            }
          }

          var m = "";
          var ct = "";
          var od = "";
          if (typeof snDB !== "undefined" && snDB && snDB[token]) {
            var r = snDB[token];
            od = r[0] || "";
            m = r[1] || "";
            ct = r[2] || "";
          }
          if (!m) m = detectModelFromSN(token);

          var fo = ord || currentOrder || od;

          var dev = {
            sn: token,
            regCode: reg,
            model: m || "未知型号",
            country: ct,
            order: fo,
            tested: false,
          };
          devices.push(dev);

          var og = null;
          for (var oi = 0; oi < orders.length; oi++) {
            if (orders[oi].orderNumber === fo) { og = orders[oi]; break; }
          }
          if (!og) {
            og = { orderNumber: fo, devices: [] };
            orders.push(og);
          }
          og.devices.push(dev);
        }
      }
      continue;
    }


		// SN: alphanumeric, 6-20 chars
    if (/^[A-Za-z0-9]{6,20}$/.test(line) && !/^bf/i.test(line)) {
      var regCode = "";
      for (var j = i + 1; j < lines.length; j++) {
        var nextLine = lines[j].trim();
        if (!nextLine) continue;
        if (/^[A-Fa-f0-9]{64}$/.test(nextLine) || /^bf/i.test(nextLine)) {
          regCode = nextLine.toUpperCase();
        }
        break;
      }

      var sn = line;
      if (seenSNs[sn]) {
        warnings.push("重复SN已跳过: " + sn);
        continue;
      }
      seenSNs[sn] = true;

      var model = "";
      var country = "";
      var orderFromDB = "";
      if (typeof snDB !== "undefined" && snDB && snDB[sn]) {
        var rec = snDB[sn];
        orderFromDB = rec[0] || "";
        model = rec[1] || "";
        country = rec[2] || "";
      }

      // SN prefix model detection fallback
      if (!model) model = detectModelFromSN(sn);

      var finalOrder = currentOrder || orderFromDB;

      var device = {
        sn: sn,
        regCode: regCode,
        model: model || "未知型号",
        country: country,
        order: finalOrder,
        tested: false
      };
      devices.push(device);

      // Add to order group
      var orderGroup = null;
      for (var o2 = 0; o2 < orders.length; o2++) {
        if (orders[o2].orderNumber === finalOrder) { orderGroup = orders[o2]; break; }
      }
      if (!orderGroup) {
        orderGroup = { orderNumber: finalOrder, devices: [] };
        orders.push(orderGroup);
      }
      orderGroup.devices.push(device);
    }
  }

  return { orders: orders, devices: devices, warnings: warnings };
}

function parseAndRender() {
  var textarea = document.getElementById("batchTextarea");
  var resultEl = document.getElementById("batchParseResult");
  if (!textarea) return;

  var rawText = textarea.value;
  if (!rawText.trim()) {
    if (resultEl) { resultEl.textContent = "请先粘贴数据"; resultEl.className = "batch-parse-result warn"; }
    return;
  }

  var parsed = parseBatchInput(rawText);
  if (parsed.devices.length === 0) {
    if (resultEl) { resultEl.textContent = "未识别到设备数据，请检查格式"; resultEl.className = "batch-parse-result warn"; }
    return;
  }

  if (resultEl) { resultEl.textContent = "正在保存..."; resultEl.className = "batch-parse-result"; }

  // Preserve tested status for existing devices
  var existingMap = {};
  _pendingCache.forEach(function(d) { existingMap[d.sn] = d; });
  parsed.devices.forEach(function(d) {
    if (existingMap[d.sn]) {
      if (existingMap[d.sn].tested) d.tested = true;
      if (existingMap[d.sn].regCode && !d.regCode) d.regCode = existingMap[d.sn].regCode;
    }
  });

  batchState.currentSN = null;
  batchImportDevices(parsed.devices).then(function() {
    var msg = "";
    if (parsed.orders.length > 0) msg += "识别到 " + parsed.orders.length + " 个订单，";
    msg += "共 " + parsed.devices.length + " 台设备。已导入完成！";
    if (parsed.warnings && parsed.warnings.length > 0) msg += " 警告: " + parsed.warnings.join("; ");
    if (resultEl) { resultEl.textContent = msg; resultEl.className = "batch-parse-result ok"; }
    refreshPendingList();
    setTimeout(function() { closeBatchDialog(); }, 800);
  }).catch(function(err) {
    if (resultEl) { resultEl.textContent = "保存失败: " + err.message; resultEl.className = "batch-parse-result warn"; }
  });
}

function renderPendingList() {

function startBatchDevice(sn) {

  }
  if (!device || device.tested) return;

    if (model === "X1" || model === "E1" || model === "X1 Lite" || model === "E1 Lite" || model === "X1 Pro" || model === "E1 Pro") {

function acquireLock(sn, user) {
  var sb = getSupabase();
  if (!sb) return Promise.resolve(false);
  var fiveMinAgo = new Date(Date.now() - 5 * 60 * 1000).toISOString();
  // Conditional update: only acquire if no active lock or lock expired or owned by same user
  return sb.from("pending_devices").update({
    locked_by: user, locked_at: new Date().toISOString()
  }).eq("sn", sn)
  .or("locked_by.is.null,locked_at.lt." + fiveMinAgo + ",locked_by.eq." + user)
  .then(function(r) {
    if (r.error) return false;
    // Verify: read back to confirm we own the lock
    return sb.from("pending_devices").select("locked_by").eq("sn", sn).maybeSingle().then(function(r2) {
      return r2.data && r2.data.locked_by === user;
    });
  });
}

function releaseLock(sn) {
  var sb = getSupabase();

}

    return fw || ov;
  }

  var timeStr = String(now.getHours()).padStart(2, "0") + ":" + String(now.getMinutes()).padStart(2, "0") + ":" + String(now.getSeconds()).padStart(2, "0");

  // Build test content from steps

  var a = document.createElement("a");
  var now = new Date();
  var dateStr = now.getFullYear() + "-" + String(now.getMonth() + 1).padStart(2, "0") + "-" + String(now.getDate()).padStart(2, "0");
  a.href = url;
  a.download = "设备测试记录_" + dateStr + ".xls";
  a.click();
  URL.revokeObjectURL(url);
}

// Ensure chat panel uses full app height when in chat mode
(function() {
  var style = document.createElement("style");
  style.textContent = '.app { transition: max-width 0.3s ease; }';
  document.head.appendChild(style);
})();

</script>

<script async src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<!-- Batch import dialog -->
<div class="batch-overlay" id="batchOverlay" style="display:none">
  <div class="batch-dialog">
    <div class="batch-dialog-header">
      <span style="font-weight:700;font-size:15px;">📋 批量导入</span>
      <button onclick="closeBatchDialog()" style="background:none;border:none;font-size:20px;cursor:pointer;color:#999;line-height:1;">&times;</button>
    </div>
    <textarea class="batch-textarea" id="batchTextarea"></textarea>
    <div class="batch-btn-row">
      <input type="file" id="batchFileInput" accept="image/*" style="display:none" onchange="handleImageUpload(this, 'batchTextarea', 'batchUploadBtn', 'parse')">
      <button class="batch-upload-btn" id="batchUploadBtn" onclick="document.getElementById('batchFileInput').click()">📷 上传图片识别</button>
      <button class="batch-parse-btn" onclick="parseAndRender()">解析</button>
    </div>
    <div class="batch-parse-result" id="batchParseResult"></div>
  </div>
</div>

<!-- Add Device Dialog -->
<div class="batch-overlay" id="addDeviceOverlay" style="display:none">
  <div class="batch-dialog">
    <div class="batch-dialog-header">
      <span style="font-weight:700;font-size:15px;">➕ 新增设备</span>
      <button onclick="closeAddDeviceDialog()" style="background:none;border:none;font-size:20px;cursor:pointer;color:#999;line-height:1;">&times;</button>
    </div>
    <textarea class="batch-textarea" id="addDeviceTextarea"></textarea>
    <div class="batch-btn-row">
      <input type="file" id="addDeviceFileInput" accept="image/*" style="display:none" onchange="handleImageUpload(this, 'addDeviceTextarea', 'addDeviceUploadBtn', 'add')">
      <button class="batch-upload-btn" id="addDeviceUploadBtn" onclick="document.getElementById('addDeviceFileInput').click()">📷 上传图片识别</button>
      <button class="batch-parse-btn" onclick="addDevicesFromDialog()">添加</button>
    </div>
    <div class="batch-parse-result" id="addDeviceResult"></div>
  </div>
</div>

<!-- Pending drawer -->
<div class="batch-drawer" id="batchDrawer" style="display:none">
  <div class="batch-drawer-header">
    <span>⏳ 待测列表</span>
    <span class="batch-drawer-count" id="pendingDrawerCount">0台未测</span>
    <button class="drawer-del-all" onclick="event.stopPropagation();deleteAllDevices()">全部删除</button>
    <button onclick="event.stopPropagation();togglePendingDrawer()" style="background:none;border:none;font-size:18px;cursor:pointer;color:#999;">&times;</button>
  </div>
  <div class="batch-drawer-body" id="pendingDrawerItems"></div>
</div>

<!-- Records popup -->
<div class="records-popup-overlay" id="recordsPopupOverlay" onclick="closeRecordsPopup()">
  <div class="records-popup" onclick="event.stopPropagation()">
    <div class="records-popup-header">
      <span>测试记录（<span id="popupRecordCount">0</span>条）</span>
      <button class="records-popup-close" onclick="closeRecordsPopup()">&times;</button>
    </div>
    <div class="records-popup-table-wrap">
      <table class="records-table" id="popupRecordsTable">
        <thead><tr>
          <th>时间</th><th>发货国家</th><th>订单号</th><th>测试人</th><th>设备型号</th><th>SN</th><th>固件版本</th><th>注册情况</th><th>其他重要信息</th><th>IMEI号</th><th>备注2</th>
        </tr></thead>
        <tbody id="popupRecordsBody"></tbody>
      </table>
    </div>
  </div>
</div>

<div class="test-actions" style="display:none">
  <button onclick="openBatchDialog()" title="批量导入">批量导入</button>
  <button id="btnPendingDrawer" onclick="togglePendingDrawer()" style="display:none;" title="待测列表">待测 <span class="badge" id="btnPendingCount">0</span></button>
</div>
<button class="add-device-fab" onclick="openAddDeviceDialog()" title="新增设备" style="display:none">＋ 新增设备</button>
</body>
</html>
